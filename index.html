<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrainingPalace</title>
    <link rel="stylesheet" href="sport.css">
</head>
<body>

    <div class="container">

        <!-- POZADINA -->
        <div class="left-side">

            <div class="overlay"></div>

            <!-- NAVBAR -->
            <nav class="navbar">

                <div class="logo">
                    <h1>TrainingPalace</h1>
                </div>

                <div class="nav-links">
                    <a href="index.html">Početna</a>
                    <a href="usluge4.html">Usluge</a>
                    <a href="kontakt4.html">Kontakt</a>
                </div>

            </nav>

            <!-- CENTRALNI SADRŽAJ -->
            <div class="content">
                <h2>Postani jači, brži, bolji</h2>
                <p>Profesionalni sportski treninzi, personalni programi i vrhunski treneri koji te vode do cilja..</p>

                <button id="openBtn">Pridruži se</button>
            </div>

            <!-- FOOTER -->
            <div class="footer">
                <p>© 2026 TrainingPalace</p>
            </div>

        </div>

        <!-- SLIDE PANEL -->
        <div class="right-side" id="loginPanel">

            <span class="close-btn" id="closeBtn">×</span>

            <div class="form-box">
                <h2>Prijava</h2>

                <input type="text" placeholder="Ime">
                <input type="email" placeholder="Email">

                <button>Posalji</button>
            </div>

        </div>

    </div>

<script>

const openBtn = document.getElementById("openBtn");
const closeBtn = document.getElementById("closeBtn");
const loginPanel = document.getElementById("loginPanel");

openBtn.addEventListener("click", () => {
    loginPanel.classList.add("active");
});

closeBtn.addEventListener("click", () => {
    loginPanel.classList.remove("active");
});

</script>

</body>
</html>
